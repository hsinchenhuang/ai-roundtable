<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Panel</title>
  <link rel="stylesheet" href="panel.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>AI 圆桌</h1>
      <p class="subtitle">Multi-AI Roundtable</p>
    </header>

    <!-- Mode Switcher -->
    <section class="mode-switcher">
      <button class="mode-btn active" id="mode-normal">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 0 1 2 2z"/>
        </svg>
        普通
      </button>
      <button class="mode-btn" id="mode-discussion">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        讨论
      </button>
    </section>

    <!-- Normal Mode Content -->
    <div id="normal-mode">
      <section class="targets">
        <label class="target-label">
          <input type="checkbox" id="target-claude" checked>
          <span class="target-name">Claude</span>
          <span class="status" id="status-claude"></span>
        </label>
        <label class="target-label">
          <input type="checkbox" id="target-chatgpt" checked>
          <span class="target-name">ChatGPT</span>
          <span class="status" id="status-chatgpt"></span>
        </label>
        <label class="target-label">
          <input type="checkbox" id="target-gemini" checked>
          <span class="target-name">Gemini</span>
          <span class="status" id="status-gemini"></span>
        </label>
        <label class="target-label">
          <input type="checkbox" id="target-perplexity" checked>
          <span class="target-name">Perplexity</span>
          <span class="status" id="status-perplexity"></span>
        </label>
      </section>

      <section class="input-section">
        <!-- Unified Toolbar -->
        <div class="toolbar">
          <div class="toolbar-group commands">
            <button class="shortcut-btn" id="mutual-btn" data-insert="/mutual " title="互评：让所有 AI 互相评价">/mutual</button>
            <button class="shortcut-btn" data-insert="/cross " title="交叉引用">/cross</button>
            <button class="shortcut-btn" data-insert=" <- ">←</button>
            <select id="action-select" class="action-select" title="插入动作词">
              <option value="">动作</option>
              <option value="evaluate">评价</option>
              <option value="learn">借鉴</option>
              <option value="critique">批评</option>
              <option value="supplement">补充</option>
              <option value="compare">对比</option>
            </select>
          </div>
          <div class="toolbar-group mentions">
            <button class="mention-btn" data-mention="@Claude">@Claude</button>
            <button class="mention-btn" data-mention="@ChatGPT">@ChatGPT</button>
            <button class="mention-btn" data-mention="@Gemini">@Gemini</button>
            <button class="mention-btn" data-mention="@Perplexity">@Perplexity</button>
          </div>
        </div>

        <div class="file-upload-area">
          <button id="add-file-btn" class="add-file-btn" title="添加文件">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
            </svg>
          </button>
          <div id="file-list" class="file-list"></div>
        </div>

        <input type="file" id="file-input" multiple hidden accept="image/*,.pdf,.txt,.md,.json,.csv,.xml,.html,.css,.js,.ts,.py">

        <div class="input-row">
          <textarea id="message-input" placeholder="输入消息... (Enter 发送, Shift+Enter 换行)"></textarea>
          <button id="send-btn" class="send-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
            发送
          </button>
        </div>
      </section>

      <!-- Help Text -->
      <section class="help-section">
        <details>
          <summary>命令帮助</summary>
          <div class="help-content">
            <h4>互评 /mutual（推荐）</h4>
            <ul>
              <li><code>/mutual</code><br>让所有选中的 AI 互评当前回复</li>
              <li><code>/mutual 重点分析优缺点</code><br>可加自定义评价提示</li>
            </ul>
            <h4>单向引用</h4>
            <ul>
              <li><code>@Claude 评价一下 @ChatGPT</code></li>
              <li><code>/cross @Claude @Gemini <- @ChatGPT</code></li>
            </ul>
          </div>
        </details>
      </section>
    </div><!-- end normal-mode -->

    <!-- Discussion Mode Content -->
    <div id="discussion-mode" class="hidden">
      <section id="discussion-setup">
        <h3>开始讨论</h3>
        <div class="discussion-topic">
          <textarea id="discussion-topic" placeholder="输入讨论主题..."></textarea>
        </div>
        <div class="participants">
          <p>参与者：</p>
          <label>
            <input type="checkbox" name="participant" value="claude" checked>
            Claude
          </label>
          <label>
            <input type="checkbox" name="participant" value="chatgpt" checked>
            ChatGPT
          </label>
          <label>
            <input type="checkbox" name="participant" value="gemini">
            Gemini
          </label>
          <label>
            <input type="checkbox" name="participant" value="perplexity">
            Perplexity
          </label>
        </div>
        <p class="participants-hint">请选择 2 位参与者</p>
        <button id="start-discussion-btn" disabled>开始讨论</button>
      </section>

      <section id="discussion-active" class="hidden">
        <div class="discussion-header">
          <span id="round-badge" class="badge">第 1 轮</span>
          <span id="participants-badge" class="badge"></span>
          <button id="end-discussion-btn" class="btn-small btn-danger">结束</button>
        </div>
        <div id="topic-display" class="topic-display"></div>
        <div id="discussion-status" class="discussion-status waiting">等待初始回复...</div>

        <div class="interject-area">
          <p>插话（同步发送给讨论双方）</p>
          <div class="interject-input-row">
            <textarea id="interject-input" placeholder="插话内容..."></textarea>
            <button id="interject-btn">发送给双方</button>
          </div>
        </div>

        <div class="discussion-controls">
          <button id="next-round-btn" disabled>下一轮</button>
          <button id="generate-summary-btn" disabled>生成总结
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="8" y1="6" x2="21" y2="6"/>
              <line x1="8" y1="12" x2="21" y2="12"/>
              <line x1="8" y1="18" x2="21" y2="18"/>
              <line x1="3" y1="6" x2="3.01" y2="6"/>
              <line x1="3" y1="12" x2="3.01" y2="12"/>
              <line x1="3" y1="18" x2="3.01" y2="18"/>
            </svg>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <polyline points="10 9 9 9 8 9"/>
            生成总结
          </button>
        </div>
      </section>

      <section class="discussion-summary hidden" id="discussion-summary">
        <h3>讨论总结</h3>
        <div id="summary-content"></div>
        <button id="new-discussion-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          新讨论
        </button>
      </section>

    </div><!-- end discussion-mode -->

    <section class="log">
      <h3>活动日志</h3>
      <div id="log-container"></div>
    </section>

    <footer class="copyright">
      &copy; AXTONLIU™ &amp; AI 精英学院™
    </footer>
  </div>

  <script src="panel.js"></script>
</body>
</html>
